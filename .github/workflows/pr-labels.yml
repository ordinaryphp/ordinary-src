name: PR Label Check

on:
  pull_request:
    types: [opened, labeled, unlabeled, synchronize]

jobs:
  check-labels:
    name: Check Version Label
    runs-on: ubuntu-latest
    steps:
      - name: Check for version label
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            const versionLabels = labels.filter(l => l.startsWith('version:'));

            if (versionLabels.length === 0) {
              core.setFailed('PR must have a version label (version:major, version:minor, or version:patch)');
            } else if (versionLabels.length > 1) {
              core.setFailed('PR must have exactly one version label');
            } else {
              const validLabels = ['version:major', 'version:minor', 'version:patch'];
              if (!validLabels.includes(versionLabels[0])) {
                core.setFailed(`Invalid version label: ${versionLabels[0]}`);
              } else {
                core.info(`Version label found: ${versionLabels[0]}`);
              }
            }
