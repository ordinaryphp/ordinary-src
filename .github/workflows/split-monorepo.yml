name: Split Monorepo

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight

jobs:
  split:
    name: Split Packages
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - local_path: 'packages/ordinary/cli'
            split_repository: 'cli'
          - local_path: 'packages/ordinary/config'
            split_repository: 'config'
          - local_path: 'packages/ordinary/container'
            split_repository: 'container'
          - local_path: 'packages/ordinary/error'
            split_repository: 'error'
          - local_path: 'packages/ordinary/log'
            split_repository: 'log'
          - local_path: 'packages/ordinary/router'
            split_repository: 'router'
          - local_path: 'packages/ordinary/uid'
            split_repository: 'uid'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract Version Tag
        id: extract_tag
        run: |
          # Check for version bump labels on the last commit
          COMMIT_MSG=$(git log -1 --pretty=%B)
          if echo "$COMMIT_MSG" | grep -q "\[major\]"; then
            echo "bump=major" >> $GITHUB_OUTPUT
          elif echo "$COMMIT_MSG" | grep -q "\[minor\]"; then
            echo "bump=minor" >> $GITHUB_OUTPUT
          elif echo "$COMMIT_MSG" | grep -q "\[patch\]"; then
            echo "bump=patch" >> $GITHUB_OUTPUT
          else
            echo "bump=none" >> $GITHUB_OUTPUT
          fi

      - name: Split Repository
        uses: symplify/monorepo-split-github-action@main
        with:
          package_directory: ${{ matrix.package.local_path }}
          repository_organization: 'ordinaryphp'
          repository_name: ${{ matrix.package.split_repository }}
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          branch: main
        env:
          PAT: ${{ secrets.SPLIT_REPOSITORY_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.SPLIT_REPOSITORY_TOKEN }}

      - name: Inject Static Docs into Split Repo
        env:
          GITHUB_TOKEN: ${{ secrets.SPLIT_REPOSITORY_TOKEN }}
        run: |
          REPO_DIR="/tmp/static-docs-${{ matrix.package.split_repository }}"
          gh repo clone ordinaryphp/${{ matrix.package.split_repository }} "$REPO_DIR"
          cd "$REPO_DIR"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          cp "$GITHUB_WORKSPACE/LICENSE" .
          cp "$GITHUB_WORKSPACE/CONTRIBUTING.md" .
          cp "$GITHUB_WORKSPACE/SECURITY.md" .

          git add LICENSE CONTRIBUTING.md SECURITY.md
          if ! git diff --cached --quiet; then
            git commit -m "chore: sync static docs from monorepo"
            git push origin main
          fi

      - name: Create Pull Request in Split Repo
        if: steps.extract_tag.outputs.bump != 'none'
        env:
          GITHUB_TOKEN: ${{ secrets.SPLIT_REPOSITORY_TOKEN }}
        run: |
          gh repo clone ordinaryphp/${{ matrix.package.split_repository }} /tmp/${{ matrix.package.split_repository }}
          cd /tmp/${{ matrix.package.split_repository }}

          # Create version bump PR
          BRANCH_NAME="version-bump-$(date +%s)"
          git checkout -b $BRANCH_NAME

          # Update version in composer.json if needed
          echo "Version bump: ${{ steps.extract_tag.outputs.bump }}"

          git push origin $BRANCH_NAME

          gh pr create \
            --title "[${{ steps.extract_tag.outputs.bump }}] Sync from monorepo" \
            --body "Automated sync from main monorepo with version bump: ${{ steps.extract_tag.outputs.bump }}" \
            --label "version:${{ steps.extract_tag.outputs.bump }}"
